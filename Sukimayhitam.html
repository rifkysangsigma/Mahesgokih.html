<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surat Gokil Acumalaka</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0a0a0a;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* Tampilan Amplop */
        #envelope {
            cursor: pointer;
            transition: 0.3s;
        }
        #envelope:hover { transform: scale(1.1); }

        .envelope-box {
            width: 180px;
            height: 120px;
            background: #fff;
            position: relative;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        
        .envelope-box::before {
            content: "";
            position: absolute;
            top: 0;
            border-left: 90px solid transparent;
            border-right: 90px solid transparent;
            border-top: 60px solid #ddd;
        }

        /* Titik Merah */
        .red-dot {
            width: 25px;
            height: 25px;
            background: red;
            border-radius: 50%;
            z-index: 10;
            box-shadow: 0 0 15px red;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* Konten Utama */
        #main-stage {
            display: none;
            text-align: center;
            width: 100%;
        }

        .photo-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .profile-img {
            width: 250px;
            border: 5px solid white;
            border-radius: 15px;
        }

        /* Efek Mata Laser */
        .laser {
            position: absolute;
            width: 60px;
            z-index: 5;
        }
        .left { top: 22%; left: 20%; }
        .right { top: 22%; right: 20%; }

        /* Video MP4 */
        #video-gokil {
            width: 300px;
            border-radius: 15px;
            border: 4px solid #ff0000;
            display: none; /* Muncul lewat script */
        }

        /* Animasi Muter, Goyang, Hilang */
        .gokil-effect {
            display: inline-block !important;
            animation: 
                muter 1.2s forwards, 
                goyang 0.1s infinite 1.2s, 
                hilang 1s forwards 5s;
        }

        @keyframes muter {
            from { transform: scale(0) rotate(0deg); }
            to { transform: scale(1.1) rotate(1080deg); }
        }

        @keyframes goyang {
            0% { transform: scale(1.1) translate(2px, 2px) rotate(2deg); }
            50% { transform: scale(1.1) translate(-2px, -2px) rotate(-2deg); }
            100% { transform: scale(1.1) translate(2px, -2px) rotate(1deg); }
        }

        @keyframes hilang {
            to { opacity: 0; transform: scale(0); }
        }

        h1 { color: white; text-shadow: 0 0 10px red; }
    </style>
</head>
<body>

    <div id="envelope" onclick="mulai()">
        <div class="envelope-box">
            <div class="red-dot"></div>
        </div>
    </div>

    <div id="main-stage">
        <h1>ACUMALAKA GOKIL!!</h1>
        <h1>ampun gw mah</h1>
        
        <div class="photo-wrap">
            <img src="mahesgokil.jpg" class="profile-img">
            
            <h1>yowww</h1>
            
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueXF6bm96bm96bm96bm96bm96bm96bm96bm96bm96bm96JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/26AHG5K30O7X3/giphy.gif" class="laser left">
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueXF6bm96bm96bm96bm96bm96bm96bm96bm96bm96bm96JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/26AHG5K30O7X3/giphy.gif" class="laser right">
        </div>

        <br>

        <video id="video-gokil">
            <source src="video.mp4" type="video/mp4">
        </video>
    </div>

    <audio id="lagu" src="jirlah.mp3"></audio>

    <script>
        function mulai() {
            // Sembunyikan amplop
            document.getElementById('envelope').style.display = 'none';
            
            // Munculkan stage
            document.getElementById('main-stage').style.display = 'block';

            // Jalankan Video dengan Animasi
            const video = document.getElementById('video-gokil');
            video.classList.add('gokil-effect');
            video.play();

            // Jalankan lagu
            document.getElementById('lagu').play();
        }
    </script>
</body>
</html>
